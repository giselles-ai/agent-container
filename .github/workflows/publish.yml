name: Publish

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Version bump
        type: choice
        required: true
        default: patch
        options:
          - patch
          - minor
          - major

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      # Force GitHub-hosted JavaScript actions onto Node 24 ahead of the Node 20 deprecation:
      # https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
      # Keep this until pnpm/action-setup fully supports Node 24:
      # https://github.com/pnpm/action-setup/issues/182
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@08c4be7e2e672a47d11bd04269e27e5f3e8529cb # v6.0.0

      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Bump version
        run: node scripts/publish-packages.mjs bump "${{ inputs.bump }}"

      - name: Build
        run: pnpm run build --filter "@giselles-ai/*"

      - name: Replace workspace:* with resolved versions
        run: node scripts/publish-packages.mjs resolve-workspace-deps

      - name: Publish packages
        run: node scripts/publish-packages.mjs publish

      - name: Capture version
        run: printf 'VERSION=%s\n' "$(node scripts/publish-packages.mjs release-version)" >> "$GITHUB_ENV"

      - name: Restore workspace:* references
        run: node scripts/publish-packages.mjs restore-workspace-deps

      - name: Commit and tag
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          while IFS= read -r package_json; do
            git add "$package_json"
          done < <(node scripts/publish-packages.mjs package-json-paths)
          git commit -m "Release v$VERSION"
          git tag "v$VERSION"
          git push origin HEAD
          git push origin "v$VERSION"
