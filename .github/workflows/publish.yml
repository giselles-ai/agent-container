name: Publish

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Version bump
        type: choice
        required: true
        default: patch
        options:
          - patch
          - minor
          - major

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Bump version
        run: node scripts/publish-packages.mjs bump "${{ inputs.bump }}"

      - name: Build
        run: pnpm run build

      - name: Replace workspace:* with resolved versions
        run: node scripts/publish-packages.mjs resolve-workspace-deps

      - name: Publish packages
        run: node scripts/publish-packages.mjs publish

      - name: Capture version
        run: printf 'VERSION=%s\n' "$(node scripts/publish-packages.mjs release-version)" >> "$GITHUB_ENV"

      - name: Restore workspace:* references
        run: node scripts/publish-packages.mjs restore-workspace-deps

      - name: Commit and tag
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          while IFS= read -r package_json; do
            git add "$package_json"
          done < <(node scripts/publish-packages.mjs package-json-paths)
          git commit -m "Release v$VERSION"
          git tag "v$VERSION"
          git push origin HEAD
          git push origin "v$VERSION"
